<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Priyanshu Mittal — Deep Sea Developer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital,wght@0,300;0,400&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#020d1a;--deep:#041225;--ocean:#061e35;
  --teal:#0e7490;--cyan:#22d3ee;--glow:#67e8f9;--biolum:#a5f3fc;
  --white:#f0f9ff;--muted:#7cb8cc;--dim:#3a7a8c;
}
html{scroll-behavior:smooth}
body{background:var(--navy);color:var(--white);font-family:'DM Mono',monospace;overflow-x:hidden;cursor:none}
#root{width:100%;min-height:100vh}
.cursor-dot{width:8px;height:8px;background:var(--cyan);border-radius:50%;position:fixed;transform:translate(-50%,-50%);pointer-events:none;z-index:9999;box-shadow:0 0 12px var(--cyan),0 0 24px var(--cyan);transition:width .2s,height .2s}
.cursor-ring{width:32px;height:32px;border:1px solid rgba(34,211,238,.4);border-radius:50%;position:fixed;transform:translate(-50%,-50%);pointer-events:none;z-index:9998;transition:all .12s ease}
.cursor-ring.hov{width:48px;height:48px;background:rgba(34,211,238,.06);border-color:rgba(34,211,238,.7)}
#oc{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.site{position:relative;z-index:1}

.ls{position:fixed;inset:0;background:var(--navy);z-index:10000;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s ease}
.ls.done{opacity:0;pointer-events:none}
.sr{position:absolute;border-radius:50%;border:1px solid var(--cyan);top:50%;left:50%;transform:translate(-50%,-50%);animation:sonar 2s ease-out infinite;opacity:0}
.sr:nth-child(2){animation-delay:.5s}.sr:nth-child(3){animation-delay:1s}
@keyframes sonar{0%{width:20px;height:20px;opacity:.8}100%{width:140px;height:140px;opacity:0}}
.lt{font-family:'Syne',sans-serif;font-size:13px;letter-spacing:.3em;color:var(--cyan);text-transform:uppercase;margin:32px 0 24px}
.lb{width:200px;height:1px;background:rgba(34,211,238,.15);overflow:hidden}
.lf{height:100%;background:linear-gradient(90deg,transparent,var(--cyan),var(--glow));box-shadow:0 0 8px var(--cyan);transition:width .4s ease}

nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:20px 48px;display:flex;align-items:center;justify-content:space-between;transition:all .4s ease}
nav.sc{background:rgba(2,13,26,.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(34,211,238,.1)}
.nl{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--white)}
.nl span{color:var(--cyan)}
.nm{display:flex;gap:32px;list-style:none}
.nm a{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .2s;position:relative}
.nm a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--cyan);transition:width .3s;box-shadow:0 0 6px var(--cyan)}
.nm a:hover{color:var(--cyan)}.nm a:hover::after{width:100%}

.hero{min-height:100vh;display:flex;align-items:center;padding:120px 48px 80px;position:relative;overflow:hidden}
.ht{display:inline-flex;align-items:center;gap:8px;font-size:10px;letter-spacing:.35em;text-transform:uppercase;color:var(--cyan);margin-bottom:28px;opacity:0;animation:fu .8s ease .3s forwards}
.td{width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);animation:pl 2s ease infinite}
@keyframes pl{0%,100%{opacity:1;box-shadow:0 0 8px var(--cyan)}50%{opacity:.5;box-shadow:0 0 16px var(--cyan)}}
.hn{font-family:'Syne',sans-serif;font-size:clamp(52px,8vw,96px);font-weight:800;line-height:.92;letter-spacing:-.03em;margin-bottom:24px;opacity:0;animation:fu .8s ease .5s forwards}
.hn .l2{-webkit-text-stroke:1px rgba(34,211,238,.5);color:transparent}
.hn .l2 span{color:var(--cyan);-webkit-text-stroke:0}
.hr{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:32px;opacity:0;animation:fu .8s ease .7s forwards}
.rp{padding:6px 16px;border:1px solid rgba(34,211,238,.25);border-radius:99px;font-size:11px;letter-spacing:.1em;color:var(--biolum);background:rgba(14,116,144,.1);backdrop-filter:blur(8px)}
.hb{max-width:520px;font-size:14px;line-height:1.8;color:var(--muted);margin-bottom:44px;font-weight:300;opacity:0;animation:fu .8s ease .9s forwards}
.hc{display:flex;gap:16px;flex-wrap:wrap;opacity:0;animation:fu .8s ease 1.1s forwards}
.bp{padding:14px 32px;background:transparent;border:1px solid var(--cyan);color:var(--cyan);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;cursor:none;transition:all .3s;position:relative;overflow:hidden}
.bp::before{content:'';position:absolute;inset:0;background:var(--cyan);transform:translateX(-100%);transition:transform .3s;z-index:-1}
.bp:hover::before{transform:translateX(0)}.bp:hover{color:var(--navy);box-shadow:0 0 24px rgba(34,211,238,.3)}
.bg2{padding:14px 32px;background:transparent;border:1px solid rgba(255,255,255,.1);color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;cursor:none;transition:all .3s}
.bg2:hover{border-color:rgba(34,211,238,.3);color:var(--white)}
.sh{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;opacity:0;animation:fi 1s ease 2s forwards}
.sl{width:1px;height:48px;background:linear-gradient(to bottom,var(--cyan),transparent);animation:sp 2s ease infinite}
@keyframes sp{0%,100%{opacity:.3}50%{opacity:1}}
.slb{font-size:9px;letter-spacing:.3em;color:var(--dim);text-transform:uppercase}
.hdl{position:absolute;right:48px;top:50%;transform:translateY(-50%);writing-mode:vertical-rl;font-size:10px;letter-spacing:.3em;color:var(--dim);text-transform:uppercase}
.hdl span{color:var(--cyan);font-size:14px;display:block;margin-bottom:8px;writing-mode:horizontal-tb;transform:rotate(180deg)}
@keyframes fu{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}

.dd{display:flex;align-items:center;gap:16px;margin-bottom:64px}
.dn{font-size:10px;letter-spacing:.3em;color:var(--cyan);font-family:'DM Mono',monospace}
.dl{flex:1;height:1px;background:linear-gradient(90deg,rgba(34,211,238,.4),transparent)}
.dlb{font-family:'Syne',sans-serif;font-size:10px;letter-spacing:.3em;color:var(--dim);text-transform:uppercase}

section{padding:100px 48px;position:relative}
.st{font-family:'Syne',sans-serif;font-size:clamp(36px,5vw,64px);font-weight:800;line-height:1;letter-spacing:-.02em;margin-bottom:12px}
.ss{font-size:12px;letter-spacing:.2em;color:var(--cyan);text-transform:uppercase;margin-bottom:16px}
.sd{color:var(--muted);font-size:13px;line-height:1.8;max-width:480px;margin-bottom:64px;font-weight:300}

/* ABOUT */
.ag{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start}
.cf{width:100%;aspect-ratio:3/4;max-width:360px;border:1px solid rgba(34,211,238,.15);position:relative;overflow:hidden;background:linear-gradient(135deg,#041225,#082240)}
.cf::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 80%,rgba(14,116,144,.3),transparent 60%)}
.ca{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:9px;color:rgba(34,211,238,.12);white-space:pre;line-height:1.4;overflow:hidden;user-select:none}
.co{position:absolute;bottom:0;left:0;right:0;padding:32px 24px 24px;background:linear-gradient(to top,rgba(2,13,26,.95),transparent)}
.cn{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:4px}
.ct{font-size:11px;letter-spacing:.2em;color:var(--cyan);text-transform:uppercase}
.gc{position:absolute;top:-20px;left:-20px;width:80px;height:80px;border-top:1px solid var(--cyan);border-left:1px solid var(--cyan)}
.gcbr{position:absolute;bottom:-20px;right:-20px;width:80px;height:80px;border-bottom:1px solid var(--cyan);border-right:1px solid var(--cyan)}
.at h3{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;margin-bottom:20px;line-height:1.2}
.at h3 span{color:var(--cyan)}
.at p{color:var(--muted);font-size:13px;line-height:1.9;margin-bottom:20px;font-weight:300}
.asg{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:40px}
.sc2{padding:20px;border:1px solid rgba(34,211,238,.12);background:rgba(14,116,144,.05);transition:all .3s;cursor:none}
.sc2:hover{border-color:rgba(34,211,238,.3);background:rgba(14,116,144,.1)}
.sn{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:var(--cyan);line-height:1;margin-bottom:4px}
.sl2{font-size:10px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase}

/* AWARDS STRIP */
.awards{display:flex;flex-wrap:wrap;gap:10px;margin-top:28px}
.award-pill{display:flex;align-items:center;gap:6px;padding:6px 14px;border:1px solid rgba(34,211,238,.2);background:rgba(34,211,238,.04);font-size:10px;letter-spacing:.08em;color:var(--biolum)}

/* SKILLS */
.skbg{background:linear-gradient(180deg,transparent,rgba(6,30,53,.5),transparent)}
.skcats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:48px}
.skcb{padding:8px 20px;border:1px solid rgba(34,211,238,.2);background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;cursor:none;transition:all .3s}
.skcb.act,.skcb:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(34,211,238,.06)}
.skg{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.skc{padding:20px 16px;border:1px solid rgba(34,211,238,.1);background:rgba(4,18,37,.6);transition:all .3s;position:relative;overflow:hidden;cursor:none}
.skc::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--teal),var(--cyan));transform:scaleX(0);transform-origin:left;transition:transform .3s}
.skc:hover{border-color:rgba(34,211,238,.3);background:rgba(14,116,144,.1);transform:translateY(-4px);box-shadow:0 8px 32px rgba(34,211,238,.08)}
.skc:hover::before{transform:scaleX(1)}
.skn{font-family:'DM Mono',monospace;font-size:12px;color:var(--white);margin-bottom:4px}
.sklv{width:100%;height:2px;background:rgba(34,211,238,.1);margin-top:12px;overflow:hidden}
.skf{height:100%;background:linear-gradient(90deg,var(--teal),var(--cyan));box-shadow:0 0 6px var(--cyan);transition:width 1s ease}

/* PROJECTS */
.pg{display:grid;grid-template-columns:repeat(2,1fr);gap:24px}
.pc{border:1px solid rgba(34,211,238,.1);background:rgba(4,18,37,.7);backdrop-filter:blur(12px);overflow:hidden;transition:all .4s;position:relative;cursor:none}
.pc::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,rgba(34,211,238,.05),transparent 60%);opacity:0;transition:opacity .4s}
.pc:hover::after{opacity:1}
.pc:hover{border-color:rgba(34,211,238,.3);transform:translateY(-6px);box-shadow:0 20px 60px rgba(0,0,0,.4),0 0 0 1px rgba(34,211,238,.15)}
.ph{padding:28px 28px 0;display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.pcn{font-size:10px;letter-spacing:.3em;color:var(--dim);text-transform:uppercase}
.piw{width:44px;height:44px;border:1px solid rgba(34,211,238,.2);display:flex;align-items:center;justify-content:center;background:rgba(14,116,144,.1)}
.pb{padding:0 28px 28px}
.ptitle{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;margin-bottom:12px;line-height:1.2}
.pdesc{font-size:12px;line-height:1.8;color:var(--muted);margin-bottom:20px;font-weight:300}
.pimp{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--cyan);margin-bottom:20px;padding:10px 14px;background:rgba(34,211,238,.05);border-left:2px solid var(--cyan)}
.pst{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px}
.stag{padding:4px 10px;background:rgba(14,116,144,.15);border:1px solid rgba(34,211,238,.15);font-size:10px;letter-spacing:.1em;color:var(--biolum);font-family:'DM Mono',monospace}
.pls{display:flex;gap:12px}
.plb{padding:8px 18px;border:1px solid rgba(34,211,238,.2);background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;cursor:none;transition:all .3s;display:flex;align-items:center;gap:6px}
.plb:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(34,211,238,.05)}
.plb.pri{border-color:var(--cyan);color:var(--cyan)}.plb.pri:hover{background:var(--cyan);color:var(--navy)}
/* finalist badge */
.finalist{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;background:rgba(234,179,8,.08);border:1px solid rgba(234,179,8,.3);font-size:10px;color:#fde047;letter-spacing:.1em;margin-bottom:16px}

/* TIMELINE */
.tl{position:relative;padding-left:40px}
.tl::before{content:'';position:absolute;left:0;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,var(--cyan),rgba(34,211,238,.1))}
.ti{position:relative;margin-bottom:56px;opacity:0;transform:translateX(-20px);transition:all .6s ease}
.ti.vis{opacity:1;transform:translateX(0)}
.tdot{position:absolute;left:-44px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--cyan);box-shadow:0 0 12px var(--cyan),0 0 24px rgba(34,211,238,.3);border:2px solid var(--navy)}
.tdot::before{content:'';position:absolute;inset:-4px;border-radius:50%;border:1px solid rgba(34,211,238,.3);animation:rp 2s ease infinite}
@keyframes rp{0%{transform:scale(1);opacity:.8}100%{transform:scale(2.5);opacity:0}}
.tp{font-size:10px;letter-spacing:.2em;color:var(--cyan);text-transform:uppercase;margin-bottom:8px}
.tr{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:4px}
.to{font-size:12px;color:var(--muted);margin-bottom:16px;letter-spacing:.05em}
.td2{font-size:12px;line-height:1.8;color:var(--muted);font-weight:300;max-width:640px}
.td2 ul{list-style:none;padding:0}
.td2 ul li{padding:3px 0 3px 16px;position:relative}
.td2 ul li::before{content:'—';position:absolute;left:0;color:var(--dim);font-size:10px}
.ttgs{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
.ttg{padding:3px 10px;border:1px solid rgba(34,211,238,.15);font-size:10px;color:var(--dim);letter-spacing:.1em}

/* LEADERSHIP */
.lg{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
.lc{padding:28px 24px;border:1px solid rgba(34,211,238,.1);background:rgba(4,18,37,.5);transition:all .3s;cursor:none}
.lc:hover{border-color:rgba(34,211,238,.3);background:rgba(14,116,144,.08);transform:translateY(-4px)}
.lic{width:40px;height:40px;margin-bottom:16px;display:flex;align-items:center;justify-content:center}
.lt2{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:8px;line-height:1.3}
.lo{font-size:11px;color:var(--cyan);letter-spacing:.1em;margin-bottom:4px}
.lperiod{font-size:10px;color:var(--dim);letter-spacing:.08em;margin-bottom:12px}
.ld{font-size:11px;line-height:1.7;color:var(--muted);font-weight:300}

/* NEWS */
.news-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.news-card{padding:28px 24px;border:1px solid rgba(34,211,238,.1);background:rgba(4,18,37,.6);position:relative;overflow:hidden;transition:all .4s;cursor:none}
.news-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--teal),var(--cyan));transform:scaleX(0);transform-origin:left;transition:transform .4s}
.news-card:hover{border-color:rgba(34,211,238,.3);background:rgba(14,116,144,.08);transform:translateY(-5px);box-shadow:0 16px 48px rgba(0,0,0,.3),0 0 0 1px rgba(34,211,238,.12)}
.news-card:hover::before{transform:scaleX(1)}
.news-card-type{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--dim);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.news-type-dot{width:5px;height:5px;border-radius:50%;background:var(--cyan);box-shadow:0 0 6px var(--cyan);flex-shrink:0}
.news-card-icon{margin-bottom:18px;opacity:.85}
.news-card-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;line-height:1.25;margin-bottom:10px}
.news-card-org{font-size:11px;color:var(--cyan);letter-spacing:.1em;margin-bottom:10px}
.news-card-desc{font-size:11px;line-height:1.75;color:var(--muted);font-weight:300}
.news-year{position:absolute;bottom:20px;right:20px;font-size:10px;letter-spacing:.15em;color:var(--dim)}
@media(max-width:900px){.news-grid{grid-template-columns:1fr}}

/* CONTACT */
.cw{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start}
.ci h3{font-family:'Syne',sans-serif;font-size:42px;font-weight:800;line-height:1.1;margin-bottom:20px}
.ci h3 span{color:var(--cyan)}
.ci p{color:var(--muted);font-size:13px;line-height:1.8;margin-bottom:40px;font-weight:300}
.cls{display:flex;flex-direction:column;gap:16px}
.clk{display:flex;align-items:center;gap:16px;padding:16px 20px;border:1px solid rgba(34,211,238,.1);text-decoration:none;color:var(--white);transition:all .3s;cursor:none}
.clk:hover{border-color:rgba(34,211,238,.4);background:rgba(34,211,238,.05);transform:translateX(8px)}
.cli{width:32px;height:32px;border:1px solid rgba(34,211,238,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.clt{font-size:12px;letter-spacing:.05em}
.cls2{font-size:10px;color:var(--muted);letter-spacing:.1em;margin-top:2px}
.cform{display:flex;flex-direction:column;gap:16px}
.ff{display:flex;flex-direction:column;gap:8px}
.fl{font-size:10px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase}
.fi,.fta{background:rgba(4,18,37,.8);border:1px solid rgba(34,211,238,.15);color:var(--white);font-family:'DM Mono',monospace;font-size:12px;padding:14px 16px;outline:none;transition:border-color .3s,box-shadow .3s;resize:none;width:100%}
.fi:focus,.fta:focus{border-color:rgba(34,211,238,.5);box-shadow:0 0 0 3px rgba(34,211,238,.05)}
.fi::placeholder,.fta::placeholder{color:var(--dim)}
.fsub{padding:16px 32px;background:transparent;border:1px solid var(--cyan);color:var(--cyan);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;cursor:none;transition:all .3s;position:relative;overflow:hidden;align-self:flex-start}
.fsub::before{content:'';position:absolute;inset:0;background:var(--cyan);transform:translateX(-100%);transition:transform .3s;z-index:-1}
.fsub:hover::before{transform:translateX(0)}.fsub:hover{color:var(--navy)}

footer{padding:40px 48px;border-top:1px solid rgba(34,211,238,.1);display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
.ft{font-size:11px;color:var(--dim);letter-spacing:.1em}.ft span{color:var(--cyan)}
.fd{font-size:10px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase}

@media(max-width:900px){
  nav{padding:16px 24px}.nm{display:none}
  section{padding:80px 24px}.hero{padding:100px 24px 80px}
  .ag,.cw{grid-template-columns:1fr;gap:48px}
  .pg{grid-template-columns:1fr}.lg{grid-template-columns:1fr}
  .skg{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
  footer{padding:32px 24px;flex-direction:column;gap:12px;text-align:center}
  .hdl{display:none}
}
</style>
</head>

<canvas id="oc"></canvas>
<div id="root"></div>
<script>

// ─── OCEAN CANVAS ───
const OceanCanvas=()=>{
  const ref=useRef(null);
  useEffect(()=>{
    const c=ref.current,ctx=c.getContext('2d');
    let raf,t=0;
    const pts=Array.from({length:60},()=>({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,r:Math.random()*2+.5,spd:Math.random()*.3+.1,op:Math.random()*.4+.1,dr:(Math.random()-.5)*.3}));
    const resize=()=>{c.width=window.innerWidth;c.height=window.innerHeight};
    resize();window.addEventListener('resize',resize);
    const draw=()=>{
      ctx.clearRect(0,0,c.width,c.height);
      const bg=ctx.createLinearGradient(0,0,0,c.height);
      bg.addColorStop(0,'#020d1a');bg.addColorStop(.4,'#041225');bg.addColorStop(.8,'#061830');bg.addColorStop(1,'#020a14');
      ctx.fillStyle=bg;ctx.fillRect(0,0,c.width,c.height);
      for(let i=0;i<5;i++){
        const x=(c.width/5)*i+Math.sin(t*.0003+i)*40;
        const g=ctx.createLinearGradient(x,0,x+80,c.height*.7);
        g.addColorStop(0,'rgba(34,211,238,0.04)');g.addColorStop(1,'transparent');
        ctx.save();ctx.translate(x,0);ctx.rotate(Math.sin(t*.0002+i*.5)*.08);
        ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(100,c.height*.7);ctx.lineTo(-100,c.height*.7);ctx.closePath();ctx.fill();ctx.restore();
      }
      for(let w=0;w<4;w++){
        ctx.beginPath();ctx.strokeStyle=`rgba(34,211,238,${.035-w*.007})`;ctx.lineWidth=1;
        for(let x=0;x<=c.width;x+=4){const y=c.height*(.2+w*.15)+Math.sin(x*.005+t*.001+w)*(20+w*8)+Math.sin(x*.008+t*.0007+w*2)*10;x===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}
        ctx.stroke();
      }
      pts.forEach(p=>{
        p.y-=p.spd;p.x+=p.dr+Math.sin(t*.0005+p.x)*.2;
        if(p.y<-10){p.y=c.height+10;p.x=Math.random()*c.width}
        if(p.x<0)p.x=c.width;if(p.x>c.width)p.x=0;
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        const grd=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*3);
        grd.addColorStop(0,`rgba(103,232,249,${p.op})`);grd.addColorStop(1,'transparent');
        ctx.fillStyle=grd;ctx.fill();
      });
      t++;raf=requestAnimationFrame(draw);
    };draw();
    return()=>{window.removeEventListener('resize',resize);cancelAnimationFrame(raf)};
  },[]);
  return h('canvas',{ref,id:'oc'});
};
